# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# RECALL — Cloud-Native Docker Compose (Phase 2)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Orchestrates all four RECALL services:
#   1. client   — React/Vite frontend
#   2. server   — Node/Express API + JWT auth
#   3. ai-engine — FastAPI + Gemini LLM microservice
#   4. mongodb  — Persistent data store
#
# Usage:
#   docker-compose up --build
#   docker-compose down -v   (tear down with volumes)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

version: "3.9"

services:
  # ── MongoDB ────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: recall-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: recall
    networks:
      - recall-network

  # ── Node/Express Backend ───────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: recall-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/recall
      JWT_SECRET: ${JWT_SECRET:-recall_default_dev_secret}
      AI_ENGINE_URL: http://ai-engine:8001
    networks:
      - recall-network

  # ── FastAPI AI Engine ──────────────────────────
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: recall-ai-engine
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    networks:
      - recall-network

  # ── React/Vite Frontend ────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: recall-client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server
    networks:
      - recall-network

volumes:
  mongo_data:
    driver: local

networks:
  recall-network:
    driver: bridge
